<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gamdog | Scheduler Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root {
            /* 공통 테마 컬러 */
            --bg-app: #f5f5f4;
            --bg-canvas: #ffffff;
            --bg-input: #fafaf9;
            --text-primary: #1c1917;
            --text-secondary: #44403c;
            --text-muted: #78716c;
            --border-primary: #e7e5e4;
            --border-muted: #f5f5f4;

            /* 타 앱과 통일된 Green Primary */
            --primary: #16a34a;       
            --primary-hover: #15803d;
            --primary-light: rgba(22, 163, 74, 0.1);
            --danger: #ef4444;

            /* gamdog 전용 테이블 변수 */
            --g1-tint: #f8fafc; --g1-stroke: #94a3b8; --g1-text: #475569;
            /* 2학년: Green (메인 테마 컬러와 통일감 부여) */
            --g2-tint: #f0fdf4; --g2-stroke: #86efac; --g2-text: #15803d;
            /* 3학년: Terracotta (따뜻하고 차분한 오렌지) */
            --g3-tint: #fff7ed; --g3-stroke: #fdba74; --g3-text: #c2410c;
            --hw-active-bg: #f0fdf4;
            --hw-active-border: #86efac;

            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-app: #09090b;
            --bg-canvas: #18181b;
            --bg-input: #27272a;
            --text-primary: #fafafa;
            --text-secondary: #e4e4e7;
            --text-muted: #a1a1aa;
            --border-primary: #27272a;
            --border-muted: #18181b;
            
            --primary: #9EFF8D;       
            --primary-hover: #7CE86B;
            --primary-light: rgba(158, 255, 141, 0.15);

            --g1-tint: rgba(148, 163, 184, 0.1); --g1-stroke: #475569; --g1-text: #94a3b8;
            --g2-tint: rgba(22, 163, 74, 0.1);   --g2-stroke: #16a34a; --g2-text: #4ade80;
            --g3-tint: rgba(234, 88, 12, 0.1);   --g3-stroke: #9a3412; --g3-text: #fb923c;
            --hw-active-bg: rgba(16, 185, 129, 0.15);
            --hw-active-border: rgba(16, 185, 129, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body.preload, body.preload * { transition: none !important; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-app); color: var(--text-primary); transition: 0.2s; }

        /* 1. 기본 레이아웃 (Left Sidebar 340px) */
        .app-layout { display: grid; grid-template-columns: 340px 1fr; min-height: 100vh; }
        .mobile-header { display: none; }
        #overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 90; opacity: 0; visibility: hidden; transition: 0.2s; }
        #overlay.active { opacity: 1; visibility: visible; }

        /* 2. 사이드바 (Control Panel) */
        .control-panel { background: var(--bg-canvas); border-right: 1px solid var(--border-primary); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; z-index: 100; }
        .brand-deck { padding: 24px; border-bottom: 1px solid var(--border-primary); }
        .brand-title { display: flex; align-items: center; gap: 12px; }
        .brand-logo-box { width: 36px; height: 36px; background: var(--primary); color: var(--bg-canvas); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .brand-logo-box svg { width: 20px; height: 20px; }
        .brand-text h2 { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
        .brand-text p { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .panel-scroll-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; }
        .group-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }

        /* 공통 인풋/설정 카드 */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-card { background: var(--bg-input); border: 1px solid var(--border-primary); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
        .input-card label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .number-stepper { display: flex; align-items: center; justify-content: space-between; }
        .number-stepper button { background: none; border: none; font-size: 16px; font-weight: 700; color: var(--text-secondary); cursor: pointer; }
        .number-stepper input { border: none; background: transparent; text-align: center; font-size: 14px; font-weight: 700; color: var(--text-primary); width: 100%; pointer-events: none; }

        .hud-card { background: var(--bg-input); border: 1px solid var(--border-primary); border-radius: 8px; padding: 16px; }
        .hud-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; background: #d4d4d8; border-radius: 50%; }
        .status-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }

        .file-upload-wrapper { position: relative; }
        .file-upload-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

        /* 공통 버튼 */
        .panel-footer { padding: 24px; border-top: 1px solid var(--border-primary); display: flex; flex-direction: column; gap: 12px; background: var(--bg-canvas); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; border: 1px solid transparent; outline:none; }
        .btn-primary { background: var(--primary); color: var(--bg-canvas); box-shadow: var(--shadow-sm); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:disabled { background: var(--border-primary); color: var(--text-muted); cursor: not-allowed; }
        .btn-ghost { background: transparent; color: var(--text-secondary); }
        .btn-ghost:hover { background: var(--bg-input); color: var(--text-primary); }

        [data-theme="light"] #icon-sun { display: none; }
        [data-theme="light"] #icon-moon { display: block; }
        [data-theme="dark"] #icon-sun { display: block; }
        [data-theme="dark"] #icon-moon { display: none; }

        /* 3. 워크스페이스 & 결과 캔버스 */
        .workspace { padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; background-color: var(--bg-app); background-image: radial-gradient(var(--border-primary) 1px, transparent 1px); background-size: 24px 24px; }
        .workspace-card { background: var(--bg-canvas); border: 1px solid var(--border-primary); border-radius: 12px; padding: 24px; box-shadow: var(--shadow-sm); }
        .workspace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 15px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .section-desc { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* (기존 gamdog 전용 테이블 및 결과 출력 CSS는 그대로 유지) */
        .table-container { border: 1px solid var(--border-primary); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; user-select: none; table-layout: fixed; background: var(--bg-canvas); }
        th, td { border: 1px solid var(--border-primary); text-align: center; font-size: 12px; height: 38px; }
        th { background: var(--bg-input); font-weight: 600; color: var(--text-muted); font-size: 11px; }
        .g1-header { border-bottom: 2px solid var(--g1-stroke); color: var(--g1-text); font-weight: 700; }
        .g2-header { border-bottom: 2px solid var(--g2-stroke); color: var(--g2-text); font-weight: 700; }
        .g3-header { border-bottom: 2px solid var(--g3-stroke); color: var(--g3-text); font-weight: 700; }
        .exam-cell { cursor: crosshair; color: var(--text-secondary); transition: 0.1s; }
        .exam-cell:hover { background: var(--bg-input); }
        .exam-cell.has-subject[data-grade="1"] { background: var(--g1-tint) !important; color: var(--g1-text); box-shadow: inset 3px 0 0 0 var(--g1-stroke); font-weight: 700; }
        .exam-cell.has-subject[data-grade="2"] { background: var(--g2-tint) !important; color: var(--g2-text); box-shadow: inset 3px 0 0 0 var(--g2-stroke); font-weight: 700; }
        .exam-cell.has-subject[data-grade="3"] { background: var(--g3-tint) !important; color: var(--g3-text); box-shadow: inset 3px 0 0 0 var(--g3-stroke); font-weight: 700; }
        .exam-cell.selected { background: var(--primary-light) !important; color: var(--primary); }
        .exam-cell.sel-single { box-shadow: inset 0 0 0 1.5px var(--primary); }
        .exam-cell.sel-left { box-shadow: inset 1.5px 0 0 0 var(--primary), inset 0 1.5px 0 0 var(--primary), inset 0 -1.5px 0 0 var(--primary); }
        .exam-cell.sel-mid { box-shadow: inset 0 1.5px 0 0 var(--primary), inset 0 -1.5px 0 0 var(--primary); }
        .exam-cell.sel-right { box-shadow: inset -1.5px 0 0 0 var(--primary), inset 0 1.5px 0 0 var(--primary), inset 0 -1.5px 0 0 var(--primary); }

        .empty-state { text-align: center; padding: 60px 20px; background: var(--bg-canvas); border: 1px dashed var(--border-primary); border-radius: 12px; }
        .empty-icon { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px; }
        .empty-state h3 { font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
        .empty-state p { font-size: 12px; color: var(--text-muted); }

        /* 모달 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-canvas); padding: 24px; border-radius: 12px; width: 320px; box-shadow: var(--shadow-md); transform: scale(0.95); transition: 0.2s; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
        .modal-input { width: 100%; padding: 10px; border: 1px solid var(--border-primary); border-radius: 8px; font-size: 13px; margin-bottom: 20px; outline: none; background: var(--bg-input); color: var(--text-primary); }
        .modal-input:focus { border-color: var(--primary); }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }

        /* 결과 렌더링 스타일 (기존 유지) */
        .period-block { background: var(--bg-canvas); border: 1px solid var(--border-primary); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .period-header { font-size: 14px; font-weight: 800; border-bottom: 1px solid var(--border-muted); padding-bottom: 12px; margin-bottom: 16px; }
        .floor-row { display: flex; gap: 8px; background: var(--bg-input); padding: 8px; border-radius: 8px; margin-bottom: 8px; }
        .class-group { display: flex; gap: 6px; flex: 1; }
        .class-card { flex: 1; background: var(--bg-canvas); border: 1px solid var(--border-primary); border-radius: 6px; padding: 8px; text-align: center; }
        .class-card.g1 { border-left: 3px solid var(--g1-stroke); }
        .class-card.g2 { border-left: 3px solid var(--g2-stroke); }
        .class-card.g3 { border-left: 3px solid var(--g3-stroke); }
        .class-card.empty { opacity: 0.4; border: 1px dashed var(--border-primary); }
        .card-meta { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .card-subject { font-size: 12px; font-weight: 800; margin-bottom: 6px; }
        .teacher-box { display: flex; gap: 4px; }
        .teacher-name { background: var(--bg-input); font-size: 10px; padding: 4px; border-radius: 4px; border: 1px solid var(--border-primary); flex: 1; font-weight: 600; }

        /* 4. 모바일 반응형 처리 */
        @media (max-width: 1024px) {
            .app-layout { grid-template-columns: 1fr; min-height: auto; }
            .mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--bg-canvas); border-bottom: 1px solid var(--border-primary); position: sticky; top: 0; z-index: 80; }
            .brand-info { display: flex; align-items: center; gap: 8px; }
            .brand-info .brand-logo { width: 24px; height: 24px; color: var(--primary); }
            .brand-info h1 { font-size: 16px; font-weight: 800; }
            
            .workspace { padding: 20px 16px; background-size: 16px 16px; }
            .workspace-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            
            .control-panel { position: fixed; top: auto; bottom: 0; left: 0; right: 0; height: 85vh; border-right: none; border-top: 1px solid var(--border-primary); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
            .control-panel.active { transform: translateY(0); }
            .brand-deck { display: none; }
            .panel-scroll-area { padding: 20px; }
            .panel-footer { padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

            .table-container, .building { overflow-x: auto; }
            table { min-width: 1000px; }
            .floor-row { min-width: 820px; }
        }

        /* 1. 아웃라인 버튼 다크모드 최적화 */
        .btn-outline { 
            background: transparent; /* 흰색이 아닌 투명 배경 사용 */
            border-color: var(--border-primary); 
            color: var(--text-primary); 
        }
        .btn-outline:hover { 
            background: var(--bg-input); 
            border-color: var(--text-muted); 
        }

        /* 2. 추가: 모달 삭제 버튼 전용 Danger 아웃라인 스타일 */
        .btn-danger-outline {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            display: inline-flex; align-items: center; justify-content: center; 
            padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; 
            cursor: pointer; transition: 0.2s;
        }
        .btn-danger-outline:hover {
            background: rgba(239, 68, 68, 0.1); /* 다크/라이트 모두 어울리는 투명 레드 */
        }

        /* 3. 층별 라벨(dept-label) 다크테마 이질감 해소 */
        .dept-label { 
            width: 52px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            /* 글자색 변수를 배경으로 쓰지 않고 독립적인 UI 컬러 사용 */
            background: var(--bg-input); 
            border: 1px solid var(--border-primary);
            color: var(--text-primary); 
            font-weight: 800; 
            border-radius: 6px; 
            font-size: 11px; 
        }

        /* 기본 상태 (빈 공간) */
        .hallway-zone { 
            width: 84px; 
            border: 1px dashed var(--border-primary); 
            border-radius: 6px; 
            background: transparent; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 배정 완료 (Active) - 사방 테두리를 없애고 모던한 음각 느낌 연출 */
        .hallway-zone.active { 
            border-color: transparent; 
            background: var(--bg-input); 
        }

        /* 모던 SaaS 스타일: 좌측 엣지 포인트 라인 */
        .hallway-zone.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--primary); /* 메인 그린 컬러 포인트 */
        }

        /* 내부 텍스트 스타일 */
        .hw-label { font-size: 9px; color: var(--text-muted); font-weight: 700; margin-bottom: 2px; }
        .hw-teacher { font-size: 11px; font-weight: 800; color: var(--text-primary); }

        /* 인원 부족 (Error) 상태 적용 */
        .hallway-zone.error {
            border-color: transparent;
            background: rgba(239, 68, 68, 0.08); /* 옅은 붉은 배경 */
        }
        .hallway-zone.error::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 3px;
            background: var(--danger); /* 붉은색 엣지 포인트 */
        }
        .hw-error { font-size: 10px; color: var(--danger); font-weight: 800; }
    </style>
</head>
<body>
    <!-- 1. 추가: 모바일 전용 헤더 -->
    <header class="mobile-header">
        <div class="brand-info">
            <svg class="brand-logo" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"></path></svg>
            <h1>gamdog</h1>
        </div>
        <button class="btn-icon" onclick="toggleSettings()" title="설정 열기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </header>

    <div class="app-layout">
        <!-- 2. 추가: 모바일 오버레이 -->
        <div id="overlay" onclick="toggleSettings()"></div>

        <!-- 3. 좌측으로 이동: 제어 패널 (Sidebar) -->
        <aside class="control-panel" id="controlPanel">
            <div class="brand-deck">
                <div class="brand-title">
                    <div class="brand-logo-box">
                        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"></path></svg>
                    </div>
                    <div class="brand-text">
                        <h2>Gam Dog</h2>
                        <p>Scheduler Engine</p>
                    </div>
                </div>
            </div>

            <!-- 스크롤 영역 -->
            <div class="panel-scroll-area">
                <div class="control-group">
                    <span class="group-label">System Status</span>
                    <div class="hud-card">
                        <div class="hud-title">
                            <span id="statusIndicator" class="status-dot"></span>
                            ENGINE STATUS
                        </div>
                        <span id="uploadStatus" class="status-text" style="font-weight: 700; font-size: 13px;">교사 명단 미등록</span>
                    </div>
                </div>

                <div class="control-group">
                    <span class="group-label">1. 기본 설정 (Settings)</span>
                    <div class="grid-inputs">
                        <div class="input-card">
                            <label>시험 일수</label>
                            <div class="number-stepper">
                                <button onclick="changeDays(-1)">−</button>
                                <input type="number" id="daysInput" value="2" readonly>
                                <button onclick="changeDays(1)">+</button>
                            </div>
                        </div>
                        <div class="input-card">
                            <label>최대 교시</label>
                            <div class="number-stepper">
                                <button onclick="changePeriods(-1)">−</button>
                                <input type="number" id="periodsInput" value="3" readonly>
                                <button onclick="changePeriods(1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <span class="group-label">2. 교사 데이터 로드 (Data)</span>
                    <div class="file-upload-wrapper">
                        <button class="btn btn-outline" style="width: 100%;">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"></path></svg>
                            교사 로스터 엑셀 로드
                        </button>
                        <input type="file" id="excelInput" class="file-upload-input" accept=".xlsx, .xls" />
                    </div>
                </div>
            </div>

            <!-- 하단 고정 영역 -->
            <div class="panel-footer">
                <button class="btn btn-ghost theme-toggle-btn" onclick="toggleTheme()">
                    <svg id="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <span id="themeToggleText">다크 테마</span>
                </button>

                <button id="runBtn" class="btn btn-primary" onclick="runAssignment()" disabled>
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.348a1.125 1.125 0 010 1.971l-11.54 6.347a1.125 1.125 0 01-1.667-.985V5.653z"></path></svg>
                    배정 알고리즘 실행
                </button>
            </div>
        </aside>

        <!-- 4. 우측 메인 캔버스 -->
        <main class="workspace">
            
            <!-- 시간표 수립 카드 -->
            <section class="workspace-card">
                <div class="workspace-header">
                    <h2 class="section-title">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-13.5 18v-2.25z"></path></svg>
                        시험 일정 설계
                    </h2>
                    <span class="section-desc">가로로 문지르거나 드래그하여 시험 과목 정보를 입력하세요.</span>
                </div>
                
                <div class="table-container">
                    <div id="scheduleTableContainer"></div>
                </div>
            </section>

            <!-- 배정 결과 대시보드 출력부 -->
            <section id="mainOutput">
                <div class="empty-state">
                    <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path>
                    </svg>
                    <h3>대기 중인 결과가 없습니다</h3>
                    <p>상단 패널의 절차에 따라 교사 명단을 업로드하고 배정 알고리즘을 가동하여 주십시오.</p>
                </div>
            </section>

        </main>
    </div>

    <!-- 과목 입력 모달 -->
    <div class="modal-overlay" id="subjectModal">
        <div class="modal-content">
            <div class="modal-title">시험 과목 설정</div>
            <input type="text" id="subjectInput" class="modal-input" placeholder="과목 입력 (미기입 시 삭제)" autocomplete="off">
            <div class="modal-footer">
                <button class="btn-danger-outline" style="width: auto; padding: 6px 12px; font-size: 12px;" onclick="saveSubject('')">삭제</button>
                <div style="display: flex; gap: 6px;">
                    <button class="btn btn-outline" style="width: auto; padding: 6px 12px; font-size: 12px;" onclick="closeModal()">취소</button>
                    <button class="btn btn-primary" style="width: auto; padding: 6px 14px; font-size: 12px;" onclick="saveSubject(document.getElementById('subjectInput').value)">적용</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- [추가] 테마 초기화 로직 (새 시스템 연동) ---
        (function () {
            const savedTheme = localStorage.getItem('schoolAppsTheme');
            const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme ? savedTheme : (systemPrefersDark ? 'dark' : 'light');
            document.body.setAttribute('data-theme', theme);
        })();

        // 페이지 로드 후 깜빡임 방지
        window.onload = function () {
            setTimeout(() => { document.body.classList.remove('preload'); }, 100);
        }

        const departments = ["1과", "2과", "3과", "4과"]; 
        let maxDays = 2; 
        let maxPeriods = 3; 
        let rawTeachers = [];

        let isDragging = false;
        let selectedCells = [];
        let dragStartInfo = null; 

        let lastAssignmentResults = null; // 가장 최근에 완료된 배정 결과 데이터
        let activeTeachersList = [];      // 배정 상태가 주입된 교사 목록


        // --- 1. 시간표 초기화 ---
        function initScheduleTable() {
            let html = `<table id="scheduleTable">`;
            html += `<thead><tr><th rowspan="2" style="width: 50px;">일차</th><th rowspan="2" style="width: 40px;">교시</th>`;
            html += `<th colspan="8" class="g1-header">1학년</th>`;
            html += `<th colspan="8" class="g2-header">2학년</th>`;
            html += `<th colspan="8" class="g3-header">3학년</th></tr><tr>`;
            
            for(let g=1; g<=3; g++) {
                for(let c=1; c<=8; c++) html += `<th>${c}반</th>`;
            }
            html += `</tr></thead><tbody>`;

            for(let d=1; d<=maxDays; d++) {
                for(let p=1; p<=maxPeriods; p++) {
                    let periodName = `${d}일차 ${p}교시`;
                    html += `<tr data-period="${periodName}">`;
                    if(p === 1) html += `<td rowspan="${maxPeriods}" style="font-weight:700; background:var(--bg-canvas); color:var(--text-secondary);">${d}일</td>`;
                    html += `<td style="color:var(--text-muted); background:var(--bg-app);">${p}</td>`;
                    
                    for(let g=1; g<=3; g++) {
                        for(let c=1; c<=8; c++) {
                            html += `<td class="exam-cell" data-grade="${g}" data-class="${c}" data-classes="${c}"></td>`;
                        }
                    }
                    html += `</tr>`;
                }
            }
            html += `</tbody></table>`;
            document.getElementById('scheduleTableContainer').innerHTML = html;
            attachDragEvents();

            // 설정값 변경 시 하단 출력 영역 초기화 및 전역 변수 리셋
            document.getElementById('mainOutput').innerHTML = `
                <div class="empty-state">
                    <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path>
                    </svg>
                    <h3>대기 중인 결과가 없습니다</h3>
                    <p>상단 패널의 절차에 따라 교사 명단을 업로드하고 배정 알고리즘을 가동하여 주십시오.</p>
                </div>
            `;
            lastAssignmentResults = null;
            activeTeachersList = [];
        }

        // --- 2. 1차원 보간(Interpolation) 드래그 및 모바일 터치 이벤트 바인딩 ---
        function attachDragEvents() {
            const table = document.getElementById('scheduleTable');

            // 마우스 이벤트 바인딩
            table.addEventListener('mousedown', (e) => {
                let cell = e.target.closest('.exam-cell');
                if(cell) {
                    isDragging = true;
                    const rowEle = cell.closest('tr');
                    const allCells = Array.from(rowEle.querySelectorAll('.exam-cell'));
                    dragStartInfo = {
                        rowEle: rowEle,
                        startX: allCells.indexOf(cell),
                        allCells: allCells
                    };
                    updateSelection(cell);
                }
            });

            table.addEventListener('mouseover', (e) => {
                if(!isDragging) return;
                let cell = e.target.closest('.exam-cell');
                if(cell) updateSelection(cell);
            });

            window.addEventListener('mouseup', () => {
                if(isDragging) {
                    isDragging = false;
                    if(selectedCells.length > 0) openModal();
                }
            });

            // [추가] 모바일 대응용 터치 제스처 이벤트 바인딩
            table.addEventListener('touchstart', (e) => {
                let touch = e.touches[0];
                let target = document.elementFromPoint(touch.clientX, touch.clientY);
                let cell = target ? target.closest('.exam-cell') : null;
                
                if(cell) {
                    // 터치 조작 시 브라우저 스크롤 바운스가 일어나는 것을 미연에 방지
                    e.preventDefault();
                    isDragging = true;
                    const rowEle = cell.closest('tr');
                    const allCells = Array.from(rowEle.querySelectorAll('.exam-cell'));
                    dragStartInfo = {
                        rowEle: rowEle,
                        startX: allCells.indexOf(cell),
                        allCells: allCells
                    };
                    updateSelection(cell);
                }
            }, { passive: false });

            table.addEventListener('touchmove', (e) => {
                if(!isDragging) return;
                e.preventDefault(); // 스크롤 무력화
                
                let touch = e.touches[0];
                let target = document.elementFromPoint(touch.clientX, touch.clientY);
                let cell = target ? target.closest('.exam-cell') : null;
                
                // 동일한 줄(Row) 범위 내에서 드래그 움직임 처리
                if(cell && dragStartInfo && cell.closest('tr') === dragStartInfo.rowEle) {
                    updateSelection(cell);
                }
            }, { passive: false });

            window.addEventListener('touchend', () => {
                if(isDragging) {
                    isDragging = false;
                    if(selectedCells.length > 0) openModal();
                }
            });
        }

        function updateSelection(currentHoverCell) {
            let currentRowCells = Array.from(currentHoverCell.closest('tr').querySelectorAll('.exam-cell'));
            let currentX = currentRowCells.indexOf(currentHoverCell);
            if (currentX === -1) return;

            const allCells = dragStartInfo.allCells;
            let minX = Math.min(dragStartInfo.startX, currentX);
            let maxX = Math.max(dragStartInfo.startX, currentX);

            let expanded = true;
            while(expanded) {
                expanded = false;
                for (let x = minX; x <= Math.min(maxX, allCells.length - 1); x++) {
                    let c = allCells[x];
                    if (c.style.display === 'none') {
                        let repX = x;
                        while(repX >= 0 && allCells[repX].style.display === 'none') repX--;
                        if (repX >= 0 && repX < minX) {
                            minX = repX;
                            expanded = true;
                        }
                    } else {
                        let classesLength = c.getAttribute('data-classes').split(',').length;
                        if (classesLength > 1) {
                            let cEndX = x + classesLength - 1;
                            if (cEndX > maxX) {
                                maxX = cEndX;
                                expanded = true;
                            }
                        }
                    }
                }
            }

            document.querySelectorAll('.exam-cell.selected').forEach(el => {
                el.classList.remove('selected', 'sel-left', 'sel-mid', 'sel-right', 'sel-single');
            });
            selectedCells = [];
            let visibleCells = [];

            for (let x = minX; x <= maxX; x++) {
                let c = allCells[x];
                selectedCells.push(c);
                if (c.style.display !== 'none') {
                    visibleCells.push(c);
                }
            }

            if (visibleCells.length === 1) {
                visibleCells[0].classList.add('selected', 'sel-single');
            } else if (visibleCells.length > 1) {
                visibleCells.forEach((c, idx) => {
                    c.classList.add('selected');
                    if (idx === 0) c.classList.add('sel-left');
                    else if (idx === visibleCells.length - 1) c.classList.add('sel-right');
                    else c.classList.add('sel-mid');
                });
            }
        }

        // --- 3. 모달 제어 ---
        function openModal() {
            const modal = document.getElementById('subjectModal');
            const input = document.getElementById('subjectInput');
            modal.classList.add('active');
            input.value = '';
            input.focus();
        }

        // --- 4. 셀 병합 및 분할 저장 ---
        function closeModal() {
            document.getElementById('subjectModal').classList.remove('active');
            document.querySelectorAll('.exam-cell.selected').forEach(el => {
                el.classList.remove('selected', 'sel-left', 'sel-mid', 'sel-right', 'sel-single');
            });
            selectedCells = [];
            dragStartInfo = null;
        }

        document.getElementById('subjectModal').addEventListener('mousedown', function(e) {
            if (e.target === this) closeModal();
        });

        document.getElementById('subjectInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveSubject(this.value);
        });

        function saveSubject(subjectValue) {
            let cleanSubject = subjectValue.trim();
            let targetRow = dragStartInfo.rowEle;
            
            let affectedCellsInfo = [];
            
            selectedCells.forEach(cell => {
                let g = cell.getAttribute('data-grade');
                let c = parseInt(cell.getAttribute('data-class'));
                affectedCellsInfo.push({ grade: g, classNum: c });
            });

            // Split (기존 병합 해제)
            affectedCellsInfo.forEach(info => {
                let cell = targetRow.querySelector(`.exam-cell[data-grade="${info.grade}"][data-class="${info.classNum}"]`);
                if(cell) {
                    cell.style.display = ''; 
                    cell.colSpan = 1;
                    cell.innerText = '';
                    cell.classList.remove('has-subject', 'selected', 'sel-left', 'sel-mid', 'sel-right', 'sel-single');
                    cell.setAttribute('data-classes', info.classNum); 
                }
            });

            // Merge (과목 입력 시 병합)
            if (cleanSubject) {
                let groupedByGrade = {};
                affectedCellsInfo.forEach(info => {
                    if(!groupedByGrade[info.grade]) groupedByGrade[info.grade] = [];
                    groupedByGrade[info.grade].push(info.classNum);
                });

                for (let g in groupedByGrade) {
                    let classes = [...new Set(groupedByGrade[g])].sort((a,b) => a - b);
                    let targetCells = classes.map(c => targetRow.querySelector(`.exam-cell[data-grade="${g}"][data-class="${c}"]`));
                    
                    let firstCell = targetCells[0];
                    firstCell.colSpan = targetCells.length;
                    firstCell.innerText = cleanSubject;
                    firstCell.classList.add('has-subject');
                    firstCell.setAttribute('data-classes', classes.join(','));

                    for (let i = 1; i < targetCells.length; i++) {
                        targetCells[i].style.display = 'none';
                    }
                }
            }

            closeModal();
        }

        // --- 5. 데이터 추출 ---
        function buildScheduleData() {
            let scheduleData = [];
            const rows = document.querySelectorAll('#scheduleTable tbody tr');
            
            rows.forEach(row => {
                let periodName = row.getAttribute('data-period');
                let periodExams = [];
                let subjectMap = {}; 

                const cells = row.querySelectorAll('.exam-cell.has-subject');
                cells.forEach(cell => {
                    if (cell.style.display !== 'none') {
                        let subject = cell.innerText.trim();
                        let grade = parseInt(cell.getAttribute('data-grade'));
                        let classes = cell.getAttribute('data-classes').split(',').map(Number); 
                        
                        let key = `${grade}_${subject}`;
                        if(!subjectMap[key]) subjectMap[key] = { grade: grade, subject: subject, classes: [] };
                        subjectMap[key].classes = subjectMap[key].classes.concat(classes);
                    }
                });

                for(let key in subjectMap) {
                    subjectMap[key].classes = [...new Set(subjectMap[key].classes)].sort((a,b)=>a-b);
                    periodExams.push(subjectMap[key]);
                }
                
                if(periodExams.length > 0) scheduleData.push({ periodName: periodName, exams: periodExams });
            });
            return scheduleData;
        }

        // --- 6. 엑셀 로드 ---
        document.getElementById('excelInput').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

                rawTeachers = jsonData.map(t => {
                    let cleanObj = {};
                    for (let key in t) cleanObj[key.trim()] = t[key];
                    
                    // 이름 결측치 예외 처리
                    let name = cleanObj["성명"] !== undefined && cleanObj["성명"] !== null ? String(cleanObj["성명"]).trim() : "";
                    
                    // 학년/반 파싱 시 NaN 예외 처리 방어 코드
                    let gradeParsed = cleanObj["담당학년"] ? parseInt(String(cleanObj["담당학년"]).replace(/[^0-9]/g, '')) : null;
                    let classParsed = cleanObj["담당반"] ? parseInt(String(cleanObj["담당반"]).replace(/[^0-9]/g, '')) : null;

                    return {
                        연번: cleanObj["연번"],
                        성명: name,
                        과목: String(cleanObj["과목"] || ""),
                        담당학년: isNaN(gradeParsed) ? null : gradeParsed,
                        담당반: isNaN(classParsed) ? null : classParsed
                    };
                }).filter(t => t.성명 !== ""); // 이름이 비어 있는 정체불명의 더미 행 필터링
                
                document.getElementById('statusIndicator').className = "status-dot active";
                document.getElementById('uploadStatus').innerHTML = `로스터 로드됨 (${rawTeachers.length}명)`;
                document.getElementById('runBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        });

        // --- 7. 알고리즘 실행 ---
        function runAssignment() {
            const panel = document.getElementById('controlPanel');
            const currentScheduleData = buildScheduleData();
            
            if(currentScheduleData.length === 0) {
                alert("일정 영역에 시험 과목이 정의되어 있지 않습니다.");
                return;
            }

            let teachers = rawTeachers.map(t => ({ ...t, totalCount: 0 }));
            let allResults = [];

            currentScheduleData.forEach(period => {
                let periodResult = { periodName: period.periodName, rooms: {}, hallway: [] };
                let activeSubjects = new Set();
                period.exams.forEach(ex => activeSubjects.add(ex.subject));

                // 과목명 정확히 일치 비교
                let availablePool = teachers.filter(t => {
                    let teacherSubjects = String(t.과목 || "").split(',').map(s => s.trim());
                    for (let examSubj of activeSubjects) {
                        if (teacherSubjects.includes(examSubj)) return false; 
                    }
                    return true;
                });

                for (let g = 1; g <= 3; g++) {
                    for (let c = 1; c <= 8; c++) {
                        let subject = null;
                        for(let ex of period.exams) {
                            if(ex.grade === g && ex.classes.includes(c)) subject = ex.subject;
                        }
                        if (!subject) continue; 

                        // 일관성 있는 랜덤 가중치 미리 할당
                        availablePool.forEach(t => t.rand = Math.random());
                        availablePool.sort((a, b) => {
                            if (a.totalCount === b.totalCount) return a.rand - b.rand;
                            return a.totalCount - b.totalCount;
                        });

                        let roomTeachers = [];
                        for (let i = 0; i < availablePool.length; i++) {
                            let candidate = availablePool[i];
                            
                            let candGrade = candidate.담당학년 !== null ? String(candidate.담당학년) : "";
                            let candClass = candidate.담당반 !== null ? String(candidate.담당반) : "";
                            if (candGrade === String(g) && candClass === String(c)) continue; 

                            roomTeachers.push(candidate);
                            candidate.totalCount += 1; 
                            
                            availablePool.splice(i, 1);
                            i--; 
                            if (roomTeachers.length === 2) break;
                        }
                        periodResult.rooms[`${g}-${c}`] = { subject: subject, teachers: roomTeachers };
                    }
                }

                for (let row = 0; row < 4; row++) {
                    let hasExamOnFloor = false;
                    for (let g = 1; g <= 3; g++) {
                        let c1 = row * 2 + 1;
                        let c2 = row * 2 + 2;
                        if (periodResult.rooms[`${g}-${c1}`] || periodResult.rooms[`${g}-${c2}`]) {
                            hasExamOnFloor = true; break;
                        }
                    }

                    if (hasExamOnFloor) {
                        // 복도 배정용 풀 역시 안전한 랜덤 가중치 부여 후 정렬
                        availablePool.forEach(t => t.rand = Math.random());
                        availablePool.sort((a, b) => {
                            if (a.totalCount === b.totalCount) return a.rand - b.rand;
                            return a.totalCount - b.totalCount;
                        });

                        if (availablePool.length > 0) {
                            let hwTeacher = availablePool.shift();
                            hwTeacher.totalCount += 1;
                            periodResult.hallway.push(hwTeacher);
                        } else {
                            periodResult.hallway.push("SHORTAGE"); 
                        }
                    } else {
                        periodResult.hallway.push("NO_EXAM"); 
                    }
                }
                allResults.push(periodResult);
            });

            // 연산 완료 후 데이터를 전역 변수에 기록
            lastAssignmentResults = allResults;
            activeTeachersList = teachers;

            renderDashboard(allResults);
        }

        // --- 8. UI 대시보드 렌더링 ---
        function renderDashboard(allResults) {
            const outputArea = document.getElementById('mainOutput');
            outputArea.innerHTML = ''; 

            allResults.forEach(period => {
                const block = document.createElement('div');
                block.className = 'period-block';
                
                const header = document.createElement('div');
                header.className = 'period-header';
                header.textContent = period.periodName;
                block.appendChild(header);

                const building = document.createElement('div');
                building.className = 'building';

                for (let row = 0; row < 4; row++) {
                    const floorRow = document.createElement('div');
                    floorRow.className = 'floor-row';

                    const label = document.createElement('div');
                    label.className = 'dept-label';
                    label.textContent = departments[row];
                    floorRow.appendChild(label);

                    for (let g = 1; g <= 3; g++) {
                        const classGroup = document.createElement('div');
                        classGroup.className = 'class-group';

                        const c1 = row * 2 + 1;
                        const c2 = row * 2 + 2;
                        
                        classGroup.appendChild(createClassCard(g, c1, period.rooms));
                        classGroup.appendChild(createClassCard(g, c2, period.rooms));
                        floorRow.appendChild(classGroup);

                        if (g < 3) {
                            const spacer = document.createElement('div');
                            spacer.className = 'spacer';
                            floorRow.appendChild(spacer);
                        }
                    }

                    const hwZone = document.createElement('div');
                    hwZone.className = 'hallway-zone';
                    const hwTeacher = period.hallway[row];
                    
                    if (hwTeacher === "NO_EXAM") {
                        hwZone.innerHTML = `<span style="color:var(--text-muted); font-size:10px;">미시행</span>`;
                    } else if (hwTeacher === "SHORTAGE") {
                        hwZone.classList.add('error');
                        hwZone.innerHTML = `<div class="hw-error">인원 부족</div>`;
                    } else if (hwTeacher) {
                        hwZone.classList.add('active');
                        hwZone.innerHTML = `
                            <div class="hw-label">복도</div>
                            <div class="hw-teacher">${hwTeacher.성명}</div>
                        `;
                    }
                    floorRow.appendChild(hwZone);
                    building.appendChild(floorRow);
                }
                
                block.appendChild(building);
                outputArea.appendChild(block);
            });

            if(allResults.length > 0) {
                // 교사별 배정 시간표 렌더링 함수 실행
                renderTeacherScheduleTable();
                document.getElementById('mainOutput').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // --- 교사별 배정 시간표를 생성하고 렌더링하는 함수 (가로폭 고정 레이아웃 반영) ---
        function renderTeacherScheduleTable() {
            if (!lastAssignmentResults || !activeTeachersList || activeTeachersList.length === 0) return;
            
            const selectEl = document.getElementById('scheduleFormatSelect');
            const formatType = selectEl ? selectEl.value : 'location';
            
            // 교사 성명(100px), 담당 교과(100px), 각 교시별(80px) 너비를 기준으로 최소 테이블 전체 폭 계산
            const nameColWidth = 100;
            const subjectColWidth = 100;
            const periodColWidth = 85; // 복도(1과) 등의 텍스트가 잘리지 않는 안정적인 최소 크기
            const totalPeriods = maxDays * maxPeriods;
            const minTableWidth = nameColWidth + subjectColWidth + (totalPeriods * periodColWidth);

            let html = `
                <div class="workspace-card" style="margin-top: 32px;">
                    <div class="workspace-header">
                        <h2 class="section-title">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 18a11.374 11.374 0 01-9.333-2.978m11.341-5.834a3 3 0 11-6 0 3 3 0 016 0zm0 0a3 3 0 116 0 3 3 0 01-6 0z" /></svg>
                            교사별 배정 현황
                        </h2>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="control-label" style="font-size:11px;">표시 형식:</span>
                            <select id="scheduleFormatSelect" onchange="renderTeacherScheduleTable()" style="padding: 4px 8px; font-size: 11px; border-radius: 5px; border: 1px solid var(--border-primary); background: var(--bg-canvas); color: var(--text-primary); cursor: pointer; outline: none;">
                                <option value="location" ${formatType === 'location' ? 'selected' : ''}>배정 위치 (학년-반 / 복도)</option>
                                <option value="symbol" ${formatType === 'symbol' ? 'selected' : ''}>체크 표시 (O)</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-container" style="overflow-x: auto;">
                        <table style="table-layout: fixed; width: 100%; min-width: ${minTableWidth}px; border-collapse: collapse;">
                            <!-- colgroup을 이용하여 각 열의 폭을 강제로 고정합니다 -->
                            <colgroup>
                                <col style="width: ${nameColWidth}px;">
                                <col style="width: ${subjectColWidth}px;">
            `;
            
            // 각 교시 열에 동일한 고정 폭 분배
            for (let i = 0; i < totalPeriods; i++) {
                html += `<col style="width: ${periodColWidth}px;">`;
            }

            html += `
                            </colgroup>
                            <thead>
                                <tr>
                                    <th rowspan="2" style="background: var(--bg-app);">교사 성명</th>
                                    <th rowspan="2" style="background: var(--bg-app);">담당 교과</th>
            `;
            
            // 헤더 1차: 일차 구분
            for (let d = 1; d <= maxDays; d++) {
                html += `<th colspan="${maxPeriods}">${d}일차</th>`;
            }
            html += `</tr><tr>`;
            
            // 헤더 2차: 교시 구분
            for (let d = 1; d <= maxDays; d++) {
                for (let p = 1; p <= maxPeriods; p++) {
                    html += `<th style="font-size:10px;">${p}교시</th>`;
                }
            }
            html += `</tr></thead><tbody>`;

            // 교사명 기준 정렬
            const sortedTeachers = [...activeTeachersList].sort((a, b) => a.성명.localeCompare(b.성명, 'ko'));

            sortedTeachers.forEach(teacher => {
                html += `<tr>`;
                html += `<td style="font-weight: 700; background: var(--bg-canvas); color: var(--text-primary); text-align: center; height: 36px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${teacher.성명}</td>`;
                html += `<td style="color: var(--text-muted); font-size: 11px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${teacher.과목 || "-"}</td>`;

                for (let d = 1; d <= maxDays; d++) {
                    for (let p = 1; p <= maxPeriods; p++) {
                        const periodName = `${d}일차 ${p}교시`;
                        const periodResult = lastAssignmentResults.find(r => r.periodName === periodName);
                        
                        let cellValue = '';
                        let cellClass = '';
                        let roomGrade = '';

                        if (periodResult) {
                            // 고실 배정 여부 검색
                            let foundRoomKey = null;
                            for (let key in periodResult.rooms) {
                                const rData = periodResult.rooms[key];
                                if (rData.teachers.some(t => t.성명 === teacher.성명)) {
                                    foundRoomKey = key; 
                                    break;
                                }
                            }

                            // 복도 배정 여부 검색
                            let foundHallway = false;
                            let hallwayFloor = -1;
                            periodResult.hallway.forEach((hw, idx) => {
                                if (hw && hw.성명 === teacher.성명) {
                                    foundHallway = true;
                                    hallwayFloor = idx;
                                }
                            });

                            if (foundRoomKey) {
                                roomGrade = foundRoomKey.split('-')[0];
                                if (formatType === 'symbol') {
                                    cellValue = 'O';
                                } else {
                                    cellValue = foundRoomKey; 
                                }
                                cellClass = 'room-cell';
                            } else if (foundHallway) {
                                if (formatType === 'symbol') {
                                    cellValue = 'O';
                                } else {
                                    cellValue = `복도(${departments[hallwayFloor]})`;
                                }
                                cellClass = 'hallway-cell';
                            }
                        }

                        let extraAttrs = '';
                        if (cellClass === 'room-cell') {
                            extraAttrs = `class="exam-cell has-subject" data-grade="${roomGrade}"`;
                        } else if (cellClass === 'hallway-cell') {
                            extraAttrs = `style="background: var(--hw-active-bg); color: var(--primary); font-weight: 700;"`;
                        }

                        // 가로 폭을 넘어서 흘러넘치는 현상을 방지하기 위해 최소한의 truncation 스타일을 입힙니다.
                        html += `<td ${extraAttrs} style="text-align: center; font-size: 11px; height: 36px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${cellValue}</td>`;
                    }
                }
                html += `</tr>`;
            });

            html += `</tbody></table></div></div>`;
            
            let targetDiv = document.getElementById('teacherScheduleSection');
            if (targetDiv) {
                targetDiv.innerHTML = html;
            } else {
                const newDiv = document.createElement('div');
                newDiv.id = 'teacherScheduleSection';
                newDiv.innerHTML = html;
                document.getElementById('mainOutput').appendChild(newDiv);
            }
        }

        function createClassCard(grade, classNum, roomsResult) {
            const card = document.createElement('div');
            const roomData = roomsResult[`${grade}-${classNum}`];

            if (roomData) {
                card.className = `class-card g${grade}`;
                let html = `
                    <div class="card-meta">${grade}학년 ${classNum}반</div>
                    <div class="card-subject">${roomData.subject}</div>
                    <div class="teacher-box">
                `;
                
                if (roomData.teachers.length === 2) {
                    html += `<div class="teacher-name">${roomData.teachers[0].성명}</div>`;
                    html += `<div class="teacher-name">${roomData.teachers[1].성명}</div>`;
                } else if (roomData.teachers.length === 1) {
                    html += `<div class="teacher-name">${roomData.teachers[0].성명}</div>`;
                    html += `<div class="teacher-name error">공석</div>`;
                } else {
                    html += `<div class="teacher-name error" style="flex:1;">배정오류</div>`;
                }
                html += `</div>`;
                card.innerHTML = html;
            } else {
                card.className = `class-card empty`;
                card.innerHTML = `<div class="card-meta" style="margin:auto 0;">${grade}-${classNum}</div>`;
            }
            return card;
        }

        // --- 9. 세팅 및 테마 제어 로직 ---
        function hasAnySubject() {
            return document.querySelectorAll('.exam-cell.has-subject').length > 0;
        }

        function changeDays(val) {
            const input = document.getElementById('daysInput');
            let current = parseInt(input.value);
            let next = current + val;
            if (next < 1 || next > 10) return;
            
            if (hasAnySubject()) {
                if (!confirm("시험 일수를 변경하면 현재 작성 중인 일정 데이터가 초기화됩니다. 계속하시겠습니까?")) return;
            }
            
            maxDays = next;
            input.value = next;
            initScheduleTable();
        }

        function changePeriods(val) {
            const input = document.getElementById('periodsInput');
            let current = parseInt(input.value);
            let next = current + val;
            if (next < 1 || next > 10) return;
            
            if (hasAnySubject()) {
                if (!confirm("최대 교시를 변경하면 현재 작성 중인 일정 데이터가 초기화됩니다. 계속하시겠습니까?")) return;
            }
            
            maxPeriods = next;
            input.value = next;
            initScheduleTable();
        }

        function toggleSettings() {
            const panel = document.getElementById('controlPanel');
            const overlay = document.getElementById('overlay');
            if (panel) panel.classList.toggle('active');
            if (overlay) overlay.classList.toggle('active');
        }

        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('schoolAppsTheme', newTheme);
        }

        initScheduleTable();
    </script>
</body>
</html>
